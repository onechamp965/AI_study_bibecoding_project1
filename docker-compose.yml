services:
  postgres:
    image: postgres:17
    container_name: sana-postgres
    environment:
      POSTGRES_USER: sana
      POSTGRES_PASSWORD: sana
      POSTGRES_DB: sana_factory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: sana-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
